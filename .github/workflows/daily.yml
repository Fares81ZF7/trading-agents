name: Rapport quotidien Poche 2

on:
  schedule:
    # 5h54 UTC = 7h54 Paris en heure d'ete (8h54... non : 7h54).
    # En heure d'hiver, repasser a "54 6 * * *" pour rester a 7h54 Paris.
    - cron: "54 5 * * *"
  workflow_dispatch:  # permet un lancement manuel depuis l'onglet Actions

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer l'agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_CONFIG_DB_ID: ${{ secrets.NOTION_CONFIG_DB_ID }}
          YAHOO_USER: ${{ secrets.YAHOO_USER }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
          MAIL_DEST: ${{ secrets.MAIL_DEST }}
        run: python main.py
